<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>昆曲水袖动作拆解板</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./choreography.css" />
  <link rel="stylesheet" href="./review.css" />
</head>
<body>
  <main class="app">
    <header class="head">
      <div>
        <p>Kunqu Sleeve Study Board</p>
        <h1>昆曲水袖动作拆解板</h1>
      </div>
      <div class="head-btns">
        <button id="newActionBtn" type="button">新建动作</button>
        <button id="openSessionsBtn" type="button" class="btn-secondary">练习课次</button>
        <button id="openMediaLibraryBtn" type="button" class="btn-secondary">素材库</button>
      </div>
    </header>

    <section class="grid">
      <aside class="sidebar">
        <div class="tabs" id="sidebarTabs">
          <button class="tab active" type="button" data-tab="actions">动作库</button>
          <button class="tab" type="button" data-tab="sessions">课次记录</button>
          <button class="tab" type="button" data-tab="choreography">动作编排</button>
        </div>

        <div class="tab-panel active" id="panel-actions">
          <form id="actionForm">
            <h2>动作条目</h2>
            <label>动作名称<input name="name" required placeholder="如：抛袖接转身"></label>
            <label>标签<input name="tags" placeholder="圆场,亮相,慢板"></label>
            <label>练习视频或照片
              <input id="mediaInput" type="file" accept="image/*,video/*">
            </label>
            <div id="mediaPreview" class="media-preview" hidden>
              <div class="media-preview-inner"></div>
              <button type="button" id="clearMediaBtn" class="btn-small btn-danger media-clear-btn">移除</button>
            </div>
            <button type="submit">保存动作</button>
          </form>
          <label class="filter">标签筛选<input id="tagFilter" placeholder="输入标签"></label>
          <div id="actionList" class="action-list"></div>
        </div>

        <div class="tab-panel" id="panel-sessions">
          <div class="sessions-header">
            <h2>课次记录</h2>
            <button id="newSessionBtn" type="button" class="btn-small">+ 新建课次</button>
          </div>
          <div id="sessionsList" class="sessions-list"></div>
        </div>

        <div class="tab-panel" id="panel-choreography">
          <div class="choreo-header">
            <h2>动作编排</h2>
            <button id="newChoreographyBtn" type="button" class="btn-small">+ 新建编排</button>
          </div>
          <div id="choreographyList" class="choreo-list"></div>
        </div>
      </aside>

      <section class="main">
        <div class="main-tabs" id="mainTabs">
          <button class="m-tab active" type="button" data-mtab="detail">动作详情</button>
          <button class="m-tab" type="button" data-mtab="practice">练习面板</button>
          <button class="m-tab" type="button" data-mtab="review">复盘评分</button>
          <button class="m-tab" type="button" data-mtab="choreography">编排时间线</button>
        </div>

        <div class="m-tab-panel active" id="mtab-detail">
          <div class="media-wrapper" id="mediaWrapper">
            <div class="annotation-toolbar">
              <span class="toolbar-title">媒体批注</span>
              <button type="button" id="addAnnotationBtn" class="btn-small btn-accent">+ 添加批注</button>
              <button type="button" id="toggleAnnotationsBtn" class="btn-small btn-secondary">显示/隐藏</button>
              <span class="toolbar-count" id="annotationCount">0 个批注</span>
            </div>
            <div class="media-box" id="mediaBox">
              <div class="annotation-layer" id="annotationLayer"></div>
            </div>
          </div>
          <form id="frameForm" class="frame-form">
            <h2>关键帧</h2>
            <div class="row">
              <label>节点
                <select name="stage">
                  <option>起势</option>
                  <option>抛袖</option>
                  <option>收袖</option>
                  <option>转身</option>
                  <option>亮相</option>
                </select>
              </label>
              <label>时间点<input name="time" placeholder="00:08"></label>
            </div>
            <div class="row">
              <label>身体重心<input name="weight" placeholder="偏左、下沉、上提"></label>
              <label>手腕方向<input name="wrist" placeholder="内旋、外翻、平送"></label>
            </div>
            <label>节奏备注<input name="tempo" placeholder="慢起快收，落点在板后"></label>
            <label>复盘批注<textarea name="note" rows="3"></textarea></label>
            <button type="submit">加入关键帧</button>
          </form>

          <div class="review-score-section">
            <h2>复盘评分</h2>
            <div id="scoreSummary"></div>
          </div>

          <div class="history-section">
            <h2>关联历史课次</h2>
            <div id="actionHistoryList" class="history-list"></div>
          </div>
        </div>

        <div class="m-tab-panel" id="mtab-practice">
          <div id="practicePanel" class="practice-panel">
            <div class="practice-empty">
              <p>选择一个课次进入练习，或从左侧课次记录新建课次</p>
            </div>
          </div>
        </div>

        <div class="m-tab-panel" id="mtab-review">
          <div id="reviewPanel" class="review-panel">
            <div class="review-panel-empty">
              <p>选择一个动作后可进行复盘评分</p>
            </div>
          </div>
        </div>

        <div class="m-tab-panel" id="mtab-choreography">
          <div id="choreographyTimeline" class="choreo-timeline">
            <div class="choreo-timeline-empty">
              <p>从左侧选择一个编排查看时间线</p>
            </div>
          </div>
        </div>
      </section>

      <aside class="review">
        <h2>分镜时间线</h2>
        <div id="timeline" class="timeline"></div>
        <h2>左右手对照</h2>
        <div id="mirrorPane" class="mirror"></div>
      </aside>
    </section>

    <div class="modal-mask" id="sessionModal" hidden>
      <div class="modal">
        <header class="modal-head">
          <h3>新建练习课次</h3>
          <button class="modal-close" type="button" data-close-modal>×</button>
        </header>
        <div class="modal-body">
          <form id="sessionForm">
            <label>选择动作
              <select name="actionId" id="sessionActionSelect" required>
                <option value="">请选择动作</option>
              </select>
            </label>
            <div class="row">
              <label>节拍速度 (BPM)
                <input name="tempo" type="number" min="40" max="200" value="80" placeholder="80">
              </label>
              <label>预设节拍
                <select name="tempoPreset" id="tempoPresetSelect">
                  <option value="">自定义</option>
                  <option value="60">慢板 (60)</option>
                  <option value="80">中板 (80)</option>
                  <option value="100">快板 (100)</option>
                  <option value="120">急板 (120)</option>
                </select>
              </label>
            </div>
            <div class="frames-picker">
              <h4>选择关键帧（多选）</h4>
              <div id="framePickerList" class="frame-picker-list">
                <p class="muted">请先选择一个动作</p>
              </div>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" data-close-modal>取消</button>
              <button type="submit">创建并开始练习</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal-mask" id="annotationModal" hidden>
      <div class="modal">
        <header class="modal-head">
          <h3 id="annotationModalTitle">编辑批注</h3>
          <button class="modal-close" type="button" data-close-annotation>×</button>
        </header>
        <div class="modal-body">
          <form id="annotationForm">
            <div class="row">
              <label>身体部位
                <select name="bodyPart" id="bodyPartSelect">
                  <option value="左手">左手</option>
                  <option value="右手">右手</option>
                  <option value="头部">头部</option>
                  <option value="肩部">肩部</option>
                  <option value="腰部">腰部</option>
                  <option value="左腿">左腿</option>
                  <option value="右腿">右腿</option>
                  <option value="水袖">水袖</option>
                  <option value="其他">其他</option>
                </select>
              </label>
              <label>方向提示
                <select name="direction" id="directionSelect">
                  <option value="">无</option>
                  <option value="上提">上提</option>
                  <option value="下压">下压</option>
                  <option value="内旋">内旋</option>
                  <option value="外翻">外翻</option>
                  <option value="平送">平送</option>
                  <option value="左移">左移</option>
                  <option value="右移">右移</option>
                  <option value="向前">向前</option>
                  <option value="向后">向后</option>
                  <option value="顺时针">顺时针</option>
                  <option value="逆时针">逆时针</option>
                </select>
              </label>
            </div>
            <label>文字说明
              <textarea name="note" id="annotationNote" rows="3" placeholder="描述这个位置的动作要点..."></textarea>
            </label>
            <div class="annotation-video-info" id="annotationVideoInfo" hidden>
              <label>视频时间点
                <input type="text" id="annotationTimestamp" readonly>
              </label>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-danger" id="deleteAnnotationBtn" hidden>删除批注</button>
              <button type="button" class="btn-secondary" data-close-annotation>取消</button>
              <button type="submit">保存</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal-mask" id="actionEditModal" hidden>
      <div class="modal">
        <header class="modal-head">
          <h3>编辑动作</h3>
          <button class="modal-close" type="button" data-close-action-edit>×</button>
        </header>
        <div class="modal-body">
          <form id="actionEditForm">
            <input type="hidden" id="editActionId" name="actionId">
            <label>动作名称
              <input id="editActionName" name="name" required placeholder="如：抛袖接转身">
            </label>
            <label>标签
              <input id="editActionTags" name="tags" placeholder="圆场,亮相,慢板">
            </label>
            <label>替换练习视频或照片
              <input id="editMediaInput" type="file" accept="image/*,video/*">
            </label>
            <div id="editMediaPreview" class="media-preview edit-media-preview" hidden>
              <div class="media-preview-inner"></div>
              <button type="button" id="editClearMediaBtn" class="btn-small btn-danger media-clear-btn">移除</button>
            </div>
            <div id="editActionRefWarning" class="choreo-timeline-warnings" hidden></div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" data-close-action-edit>取消</button>
              <button type="submit">保存修改</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal-mask" id="choreographyModal" hidden>
      <div class="modal" style="width: min(780px, 100%);">
        <header class="modal-head">
          <h3 id="choreographyModalTitle">新建编排</h3>
          <button class="modal-close" type="button" data-close-choreo-modal>×</button>
        </header>
        <div class="modal-body">
          <form id="choreographyForm" class="choreo-form">
            <h4>编排信息</h4>
            <label>编排名称
              <input name="name" required placeholder="如：出场组合练习">
            </label>
            <label>编排描述
              <textarea name="description" rows="2" placeholder="简要描述这段编排的用途或特点..."></textarea>
            </label>
            <button type="submit">保存编排</button>
          </form>

          <div id="choreoEditorWarnings" class="choreo-editor-warnings" hidden></div>

          <h4>编排动作序列</h4>
          <div id="choreoItemsList" class="choreo-items-list">
            <p class="muted">先保存编排，再添加动作</p>
          </div>

          <div class="add-item-section">
            <h4>添加动作</h4>
            <div class="add-item-fields">
              <label>选择动作
                <select id="choreoActionSelect">
                  <option value="">选择动作</option>
                </select>
              </label>
              <label>拍数
                <input type="number" id="choreoBeatsInput" value="8" min="1" max="64" placeholder="8">
              </label>
            </div>
            <label>过门提示
              <input type="text" id="choreoTransitionInput" placeholder="如：圆场、亮相、慢板过渡">
            </label>
            <div class="add-item-note">
              <label>衔接备注
                <textarea id="choreoNoteInput" rows="2" placeholder="描述与上一个动作的衔接要点..."></textarea>
              </label>
            </div>
            <button type="button" id="addChoreoItemBtn" class="btn-accent add-item-btn">+ 添加到编排</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-mask" id="mediaLibraryModal" hidden>
      <div class="modal media-library-modal">
        <header class="modal-head">
          <h3>离线素材库</h3>
          <div class="media-lib-head-actions">
            <div id="storageInfo" class="storage-info"></div>
            <button type="button" id="cleanupOrphanBtn" class="btn-small btn-secondary">清理孤立素材</button>
            <button class="modal-close" type="button" data-close-media-lib>×</button>
          </div>
        </header>
        <div class="modal-body">
          <div id="mediaLibWarnings" class="media-lib-warnings" hidden></div>
          <div id="mediaLibraryGrid" class="media-library-grid"></div>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </main>
  <script src="./mediaLibrary.js"></script>
  <script src="./choreography.js"></script>
  <script src="./review.js"></script>
  <script src="./app.js"></script>
</body>
</html>
